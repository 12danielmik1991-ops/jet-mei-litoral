<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JET MEI Litoral</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  /* ── DARK THEME (default) ── */
  :root{
    --bg:#0a0d12;--surface:#111520;--surface2:#181e2e;--border:#1f2a40;
    --accent:#00e5ff;--accent2:#ff4757;--accent3:#2ed573;--accent4:#ffa502;
    --text:#e8edf5;--text-dim:#6b7a99;
    --slot-full:#0d2e1a;--slot-full-border:#2ed573;
    --slot-partial:#2a1e08;--slot-partial-border:#ffa502;
    --slot-empty:#1a0d0d;--slot-empty-border:#ff4757;
    --slot-none:#0f1219;--radius:6px;
    --shadow:0 4px 20px rgba(0,0,0,.4);
  }
  /* ── LIGHT THEME ── */
  html.light{
    --bg:#f0f4f8;--surface:#ffffff;--surface2:#e8edf5;--border:#d0d9e8;
    --accent:#0077cc;--accent2:#e03030;--accent3:#1a9e50;--accent4:#d47800;
    --text:#0d1117;--text-dim:#4a5568;
    --slot-full:#d4f0e0;--slot-full-border:#1a9e50;
    --slot-partial:#fdefd4;--slot-partial-border:#d47800;
    --slot-empty:#fdd;--slot-empty-border:#e03030;
    --slot-none:#e8edf5;
    --shadow:0 4px 20px rgba(0,0,0,.1);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}

  /* AUTH */
  #authOverlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:background .25s}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:44px 40px;width:360px;text-align:center;box-shadow:var(--shadow)}
  .auth-logo{font-size:44px;margin-bottom:10px}
  .auth-title{font-size:22px;font-weight:800;margin-bottom:4px}
  .auth-sub{font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace;margin-bottom:28px}
  .auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:14px;font-family:'Space Mono',monospace;outline:none;margin-bottom:12px;transition:border-color .2s,background .25s}
  .auth-input:focus{border-color:var(--accent)}
  .auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s}
  html.light .auth-btn{color:#000}
  .auth-btn:hover{opacity:.85}
  .auth-error{color:var(--accent2);font-size:12px;font-family:'Space Mono',monospace;margin-top:8px;display:none}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;transition:background .25s,border-color .25s;flex-wrap:wrap;gap:10px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#000}
  .logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px}
  .logo-sub{font-size:10px;color:var(--text-dim);font-family:'Space Mono',monospace;margin-top:1px}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* CONTROLS */
  .month-nav{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;transition:background .25s}
  .month-nav button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:15px;padding:0 3px;line-height:1}
  .month-nav span{font-family:'Space Mono',monospace;font-size:12px;min-width:110px;text-align:center;font-weight:700;color:var(--text)}

  .icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:14px;cursor:pointer;transition:all .2s;line-height:1;display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sync-btn{background:var(--accent);color:#000;border:none}
  .sync-btn:hover{opacity:.85;color:#000;border-color:transparent}
  .sync-btn.loading{opacity:.5;cursor:not-allowed}
  .logout-btn:hover{border-color:var(--accent2);color:var(--accent2)}

  /* STATUS */
  .status-bar{padding:7px 24px;font-size:11px;font-family:'Space Mono',monospace;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;transition:background .25s,border-color .25s}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);flex-shrink:0}
  .status-dot.pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

  /* SUMMARY */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;transition:background .25s,border-color .25s;box-shadow:var(--shadow)}
  .card-label{font-size:10px;color:var(--text-dim);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
  .card-val{font-size:30px;font-weight:800;line-height:1}
  .card-val.green{color:var(--accent3)}.card-val.cyan{color:var(--accent)}.card-val.red{color:var(--accent2)}.card-val.orange{color:var(--accent4)}
  .card-sub{font-size:10px;color:var(--text-dim);margin-top:4px;font-family:'Space Mono',monospace}

  /* LEGEND */
  .legend{display:flex;gap:16px;padding:0 24px 14px;font-size:11px;font-family:'Space Mono',monospace;color:var(--text-dim);align-items:center;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:11px;height:11px;border-radius:3px}

  /* CITY FILTER */
  .city-filter{display:flex;gap:5px;flex-wrap:wrap;padding:0 24px 14px}
  .city-chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all .15s;font-family:'Space Mono',monospace}
  .city-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}

  /* CALENDAR */
  .calendar-wrap{padding:0 24px 40px;overflow-x:auto}
  .calendar-table{border-collapse:separate;border-spacing:2px;min-width:100%;table-layout:fixed}
  .calendar-table th,.calendar-table td{padding:0}
  .col-name{width:155px;min-width:135px;position:sticky;left:0;z-index:10}
  .th-empty{background:var(--bg);position:sticky;left:0;z-index:20;padding:6px 10px;transition:background .25s}
  .th-day{min-width:36px;width:36px;text-align:center;padding:5px 2px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);font-weight:700;background:var(--bg);position:sticky;top:0;transition:background .25s}
  .th-day.today{color:var(--accent)}.th-day.weekend{color:var(--accent4)}
  .city-row td{padding:3px 0}
  .city-label{background:var(--surface2);border-left:3px solid var(--accent);padding:5px 10px;font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;font-family:'Space Mono',monospace;position:sticky;left:0;z-index:10;transition:background .25s}
  .city-spacer{background:var(--surface2);opacity:.3;transition:background .25s}
  .worker-name-cell{background:var(--surface);padding:3px 10px;font-size:11px;font-weight:600;color:var(--text);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;z-index:10;height:34px;transition:background .25s}
  .slot-cell{width:36px;height:34px;border-radius:4px;cursor:pointer;position:relative;transition:transform .1s;text-align:center;vertical-align:middle;font-size:10px;font-weight:700;font-family:'Space Mono',monospace}
  .slot-cell:hover{transform:scale(1.18);z-index:50}
  .slot-full{background:var(--slot-full);border:1px solid var(--slot-full-border);color:var(--accent3)}
  .slot-partial{background:var(--slot-partial);border:1px solid var(--slot-partial-border);color:var(--accent4)}
  .slot-empty{background:var(--slot-empty);border:1px solid var(--slot-empty-border);color:var(--accent2)}
  .slot-none{background:var(--slot-none);border:1px solid transparent;cursor:default}
  .slot-future{background:var(--surface2);border:1px dashed var(--border);cursor:default;opacity:.5}

  /* TOOLTIP */
  .tooltip{display:none;position:fixed;z-index:1000;background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:14px 18px;min-width:250px;max-width:310px;box-shadow:var(--shadow);pointer-events:none;transition:background .25s}
  .tooltip.visible{display:block}
  .tt-header{font-size:11px;font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border)}
  .tt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px}
  .tt-label{color:var(--text-dim)}.tt-val{font-weight:700}
  .tt-val.green{color:var(--accent3)}.tt-val.red{color:var(--accent2)}.tt-val.cyan{color:var(--accent)}.tt-val.orange{color:var(--accent4)}
  .tt-workers{margin-top:9px;padding-top:7px;border-top:1px solid var(--border)}
  .tt-worker-label{font-size:9px;color:var(--text-dim);font-family:'Space Mono',monospace;text-transform:uppercase;margin-bottom:5px}
  .tt-worker-item{font-size:11px;padding:2px 0;display:flex;gap:6px}
  .tt-worker-item .tag{color:var(--accent);font-family:'Space Mono',monospace}
  .tt-worker-item .name{color:var(--text)}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  @media(max-width:700px){
    .summary{grid-template-columns:repeat(2,1fr)}
    header{padding:10px 14px}
    .calendar-wrap{padding:0 8px 30px}
  }
</style>
</head>

    logout:'Выйти', lang_btn:'🌐 PT', theme_dark:'🌙 Dark', theme_light:'☀️ Light',

    months:['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'],
    dow:['Вс','Пн','Вт','Ср','Чт','Пт','Сб'],

  pt: {

    all_cities:'🌐 Todos', status_sync:'Última atualização', status_msgs:'mensagens',
    status_err:'Erro de sincronização', tt_status:'Status', tt_ordered:'Pedidos',
    tt_filled:'Aceitos', tt_empty:'Vazios', tt_tasks:'Tarefas', tt_workers:'Trabalhadores',
    st_full:'Preenchido', st_partial:'Parcial', st_empty:'Vazio',
    logout:'Sair', lang_btn:'🌐 RU', theme_dark:'🌙 Escuro', theme_light:'☀️ Claro',
    pct_of:'% dos pedidos', pct_open:'% em aberto',
    months:['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
    dow:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
  }
};
let lang = localStorage.getItem('jet_lang') || 'ru';
let theme = localStorage.getItem('jet_theme') || 'dark';

function t(key){ return I18N[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById('langBtn').textContent = t('lang_btn');
  document.getElementById('logoutBtn').title = t('logout');
  renderSummary();
  if (document.getElementById('calTable').innerHTML) renderTable();
}

function toggleLang() {
  lang = lang === 'ru' ? 'pt' : 'ru';
  localStorage.setItem('jet_lang', lang);
  applyLang();
}

function applyTheme() {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('themeBtn').textContent = t('theme_light');
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('themeBtn').textContent = t('theme_dark');
  }
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('jet_theme', theme);
  applyTheme();
  document.getElementById('themeBtn').textContent = theme === 'dark' ? t('theme_dark') : t('theme_light');
}

let slotsData={};

let curYear=today.getFullYear(), curMonth=today.getMonth(), activeCity='ALL';

function generateMockSlots(year,month){
  const dim=new Date(year,month+1,0).getDate();
  const td=new Date(); const slots={};
  Object.entries(WORKERS).forEach(([city,workers])=>{
    workers.forEach(w=>{
      for(let d=1;d<=dim;d++){
        const date=new Date(year,month,d);
        const isPast=date<new Date(td.getFullYear(),td.getMonth(),td.getDate());
        const isFuture=date>td;
        const key=`${w.id}_${d}`;
        if(isFuture){const r=Math.random();if(r<0.5)slots[key]={status:'empty',slotsOrdered:1,slotsFilled:0,workers:[],tasks:0,city};else if(r<0.75)slots[key]={status:'none',slotsOrdered:0,slotsFilled:0,workers:[],tasks:0,city};else slots[key]=null;}
        else if(isPast){const r=Math.random();if(r<0.15)slots[key]=null;else if(r<0.25)slots[key]={status:'empty',slotsOrdered:1,slotsFilled:0,workers:[],tasks:0,city};else if(r<0.35)slots[key]={status:'partial',slotsOrdered:2,slotsFilled:1,workers:[w],tasks:Math.floor(Math.random()*8+2),city};else slots[key]={status:'full',slotsOrdered:1,slotsFilled:1,workers:[w],tasks:Math.floor(Math.random()*15+5),city};}
        else{const r=Math.random();slots[key]=r<0.5?{status:'full',slotsOrdered:1,slotsFilled:1,workers:[w],tasks:Math.floor(Math.random()*10+1),city}:{status:'partial',slotsOrdered:2,slotsFilled:1,workers:[w],tasks:Math.floor(Math.random()*5),city};}
      }
    });
  });
  return slots;
}

async function fetchBotData(){

    const btn=document.getElementById('syncBtn');
    btn.classList.add('loading'); btn.textContent='⟳ ...';
    document.getElementById('statusDot').style.background='var(--accent4)';
    const url=`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-200&limit=200`;
    const resp=await fetch(url); const json=await resp.json();
    if(!json.ok) throw new Error('Bot API error');
    const messages=(json.result||[]).filter(u=>u.message&&u.message.chat&&u.message.chat.id==FORUM_CHAT&&(u.message.message_thread_id==TOPIC_SLOTS||u.message.message_thread_id==TOPIC_TURNOS));
    parseBotMessages(messages);
    const now=new Date();
    document.getElementById('statusText').textContent=`${t('status_sync')}: ${now.toLocaleTimeString(lang==='ru'?'ru-RU':'pt-BR')} · ${messages.length} ${t('status_msgs')}`;
    document.getElementById('statusDot').style.background='var(--accent3)';
  }catch(e){
    document.getElementById('statusText').textContent=`${t('status_err')}: ${e.message}`;
    document.getElementById('statusDot').style.background='var(--accent2)';
  }finally{
    const btn=document.getElementById('syncBtn');
    btn.classList.remove('loading'); btn.textContent='⟳ Sync';
  }
}

function parseBotMessages(messages){
  const parsed={};
  messages.forEach(upd=>{
    const msg=upd.message; if(!msg||!msg.text)return;
    const text=msg.text;
    const date=new Date(msg.date*1000);
    const day=date.getDate(),month=date.getMonth(),year=date.getFullYear();
    if(year!==curYear||month!==curMonth)return;
    let city=null;
    for(const c of CITIES){if(text.includes(CITY_NAMES[c])||text.includes(c)){city=c;break;}}
    const tagMatch=text.match(/@(\w+)/);
    const tag=tagMatch?'@'+tagMatch[1]:null;
    let worker=null;
    if(tag&&city) worker=(WORKERS[city]||[]).find(w=>w.tag.toLowerCase()===tag.toLowerCase());
    if(worker){
      const key=`${worker.id}_${day}`;
      const isAccepted=text.includes('\u2705')||text.toLowerCase().includes('aceito')||text.includes('\u043f\u0440\u0438\u043d\u044f\u0442');
      parsed[key]={status:isAccepted?'full':'partial',slotsOrdered:1,slotsFilled:isAccepted?1:0,workers:isAccepted?[worker]:[],tasks:0,city,fromBot:true};
    }
  });
  slotsData={...generateMockSlots(curYear,curMonth),...parsed};
  renderTable(); renderSummary();
}

async function syncData(){ await fetchBotData(); }

// ── RENDER ────────────────────────────────────────────
function render(){
  document.getElementById('monthLabel').textContent=`${t('months')[curMonth]} ${curYear}`;
  renderCityFilter(); renderTable(); renderSummary();
}

function renderCityFilter(){
  document.getElementById('cityFilter').innerHTML=['ALL',...CITIES].map(c=>{
    const label=c==='ALL'?t('all_cities'):`${c} · ${CITY_NAMES[c]}`;
    return `<div class="city-chip ${activeCity===c?'active':''}" onclick="setCity('${c}')">${label}</div>`;
  }).join('');
}

function renderTable(){
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const td=new Date();
  const todayDay=(td.getFullYear()===curYear&&td.getMonth()===curMonth)?td.getDate():-1;
  const table=document.getElementById('calTable');
  let html='<thead><tr><th class="th-empty col-name"></th>';
  for(let d=1;d<=dim;d++){
    const dow=new Date(curYear,curMonth,d).getDay();
    const cls=d===todayDay?'today':(dow===0||dow===6)?'weekend':'';
    html+=`<th class="th-day ${cls}">${d}<br><span style="font-size:8px;opacity:.6">${t('dow')[dow]}</span></th>`;
  }
  html+='</tr></thead><tbody>';
  const cities=activeCity==='ALL'?CITIES:[activeCity];
  cities.forEach(city=>{
    const workers=WORKERS[city]||[];
    html+=`<tr class="city-row"><td class="city-label">${city} · ${CITY_NAMES[city]}</td>`;
    for(let d=1;d<=dim;d++) html+=`<td class="city-spacer"></td>`;
    html+='</tr>';
    workers.forEach(w=>{
      const rc=ROLE_COLOR[w.role]||'#6b7a99';
      html+=`<tr><td class="worker-name-cell col-name" title="${w.name} ${w.tag}"><span style="color:${rc};font-size:8px;font-family:'Space Mono',monospace;margin-right:3px">${w.role}</span>${w.name}</td>`;
      for(let d=1;d<=dim;d++){
        const key=`${w.id}_${d}`;
        const slot=slotsData[key];
        const date=new Date(curYear,curMonth,d);
        const isFuture=date>td;
        if(!slot){html+=`<td class="slot-cell slot-none"></td>`;}
        else if(isFuture&&slot.status==='none'){html+=`<td class="slot-cell slot-future">—</td>`;}
        else{
          const cls=slot.status==='full'?'slot-full':slot.status==='partial'?'slot-partial':'slot-empty';
          const icon=slot.status==='full'?'✓':slot.status==='partial'?'½':'✗';
          const botStyle=slot.fromBot?' style="outline:2px solid var(--accent);outline-offset:-2px"':'';
          html+=`<td class="slot-cell ${cls}"${botStyle} data-key="${key}" data-day="${d}" data-wname="${w.name}" data-wtag="${w.tag}" data-city="${city}" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()">${icon}</td>`;
        }
      }
      html+='</tr>';
    });
    html+=`<tr><td style="height:5px" colspan="${dim+1}"></td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function renderSummary(){
  const dim=new Date(curYear,curMonth+1,0).getDate();
  let total=0,filled=0,empty=0,tasks=0;
  const cities=activeCity==='ALL'?CITIES:[activeCity];
  cities.forEach(city=>{
    (WORKERS[city]||[]).forEach(w=>{
      for(let d=1;d<=dim;d++){
        const s=slotsData[`${w.id}_${d}`]; if(!s)return;
        if(s.slotsOrdered>0)total+=s.slotsOrdered;
        if(s.status==='full'||s.status==='partial'){filled+=s.slotsFilled;tasks+=s.tasks;}
        if(s.status==='empty')empty++;
      }
    });
  });
  document.getElementById('sumTotal').textContent=total;
  document.getElementById('sumFilled').textContent=filled;
  document.getElementById('sumEmpty').textContent=empty;
  document.getElementById('sumTasks').textContent=tasks;
  document.getElementById('sumMonth').textContent=`${t('months')[curMonth]} ${curYear}`;
  document.getElementById('sumFilledPct').textContent=total>0?`${Math.round(filled/total*100)}${t('pct_of')}`:'';
  document.getElementById('sumEmptyPct').textContent=total>0?`${Math.round(empty/total*100)}${t('pct_open')}`:'';
}

function showTooltip(e,el){
  const slot=slotsData[el.dataset.key]; if(!slot)return;
  const day=el.dataset.day,wname=el.dataset.wname,city=el.dataset.city;
  const stLabel=slot.status==='full'?`<span style="color:var(--accent3)">● ${t('st_full')}</span>`:slot.status==='partial'?`<span style="color:var(--accent4)">◑ ${t('st_partial')}</span>`:`<span style="color:var(--accent2)">○ ${t('st_empty')}</span>`;
  let wHtml='';
  if(slot.workers&&slot.workers.length){wHtml=`<div class="tt-workers"><div class="tt-worker-label">${t('tt_workers')}</div>${slot.workers.map(w=>`<div class="tt-worker-item"><span class="tag">${w.tag}</span><span class="name">${w.name}</span></div>`).join('')}</div>`;}
  const botBadge=slot.fromBot?`<span style="color:var(--accent);font-size:9px;margin-left:5px">● BOT</span>`:'';
  const tt=document.getElementById('tooltip');
  tt.innerHTML=`<div class="tt-header">${city} · ${wname} · ${day} ${t('months')[curMonth]}${botBadge}</div>
    <div class="tt-row"><span class="tt-label">${t('tt_status')}</span><span class="tt-val">${stLabel}</span></div>
    <div class="tt-row"><span class="tt-label">${t('tt_ordered')}</span><span class="tt-val cyan">${slot.slotsOrdered}</span></div>
    <div class="tt-row"><span class="tt-label">${t('tt_filled')}</span><span class="tt-val green">${slot.slotsFilled}</span></div>
    <div class="tt-row"><span class="tt-label">${t('tt_empty')}</span><span class="tt-val red">${slot.slotsOrdered-slot.slotsFilled}</span></div>
    <div class="tt-row"><span class="tt-label">${t('tt_tasks')}</span><span class="tt-val orange">${slot.tasks}</span></div>${wHtml}`;
  const x=e.clientX+14,y=e.clientY+14;
  tt.style.left=(x+310>window.innerWidth?window.innerWidth-320:x)+'px';
  tt.style.top=(y+200>window.innerHeight?y-210:y)+'px';
  tt.classList.add('visible');
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('visible');}
function setCity(c){activeCity=c;render();}

document.getElementById('prevMonth').addEventListener('click',()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}slotsData=generateMockSlots(curYear,curMonth);render();});
document.getElementById('nextMonth').addEventListener('click',()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}slotsData=generateMockSlots(curYear,curMonth);render();});

async function init(){
  applyTheme();
  applyLang();
  slotsData=generateMockSlots(curYear,curMonth);
  render();
  await fetchBotData();
  setInterval(fetchBotData,5*60*1000);
}

// Apply theme immediately (before auth)
applyTheme();

if(sessionStorage.getItem(SESSION_KEY)==='1'){
  document.getElementById('authOverlay').style.display='none';
  init();
}
</script>
